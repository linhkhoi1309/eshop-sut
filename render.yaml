# Render Blueprint for EShop (backend API + shopper web).
#
# ⚠️ EShop is a DELIBERATELY VULNERABLE teaching app (SQLi, XSS, broken
# authz, plaintext passwords, hardcoded JWT secret). Deploy only for a
# short, controlled demo — do NOT leave it publicly running.
#
# How to deploy:
#   1. Push this repo to GitHub (already there: eshop-sut).
#   2. In Render: New > Blueprint, pick this repo. Render reads this file.
#   3. It creates two services. When prompted, set VITE_API_URL on the
#      web service to the backend's public URL, e.g.
#      https://eshop-backend.onrender.com  (shown after the backend deploys).
#   4. Click Apply. First build takes a few minutes.
#
# Note: the backend uses SQLite on an ephemeral disk and reseeds on every
# boot (database.js runs on require), so data resets on each restart/redeploy.
# That matches the app's in-memory cart behavior and is fine for a demo.

services:
  # ---- Backend API (Express + SQLite) ----
  - type: web
    name: eshop-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"

  # ---- Shopper web (Vite React static build) ----
  - type: web
    name: eshop-web
    runtime: static
    rootDir: frontend-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to the backend's public URL after the backend deploys.
      # (sync: false makes Render prompt you for it instead of guessing.)
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback so client-side routes (e.g. /profile) resolve.
      - type: rewrite
        source: /*
        destination: /index.html
